<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResumeAI – Smart Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c6cfa;
    --accent2: #fa6c8e;
    --text: #f0f0f8;
    --muted: #8888a8;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,108,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,250,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(124,108,250,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative; z-index: 1;
  }

  header {
    padding: 48px 0 32px;
    text-align: center;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,108,250,0.12);
    border: 1px solid rgba(124,108,250,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px; font-weight: 500;
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 60px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .api-row {
    display: flex; gap: 12px; margin-bottom: 24px;
  }

  input[type="text"], input[type="password"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
  }

  input::placeholder { color: var(--muted); }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .job-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 540px) { .job-row { grid-template-columns: 1fr; } }

  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #9c6cfa);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0) scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-inner {
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; }

  .score-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .score-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 3px solid var(--accent);
    background: rgba(124,108,250,0.1);
  }

  .score-number {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-label {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .score-info { flex: 1; }
  .score-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 6px;
  }

  .score-desc { color: var(--muted); font-size: 14px; line-height: 1.6; }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .result-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }
  .dot-accent { background: var(--accent); }

  .result-list {
    list-style: none;
    display: flex; flex-direction: column; gap: 8px;
  }

  .result-list li {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
  }

  .result-list li::before {
    content: '–';
    position: absolute; left: 0;
    color: var(--border);
  }

  .full-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .full-card p {
    font-size: 14px; color: var(--muted); line-height: 1.7;
  }

  .error-box {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }

  footer {
    text-align: center;
    padding: 32px 0 48px;
    color: var(--muted);
    font-size: 12px;
  }

  footer span { color: var(--accent); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">

  <header>
    <div class="logo-badge">
      <div class="logo-dot"></div>
      Powered by Gemini AI
    </div>
    <h1>Resume<span>AI</span></h1>
    <p class="subtitle">Paste your resume and get instant AI-powered feedback to land your dream job.</p>
  </header>

  <div class="main-card">
    <div class="section-label">Your Gemini API Key</div>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="Paste your Gemini API key here..." />
    </div>

    <div class="section-label">Target Job (optional)</div>
    <div class="job-row">
      <input type="text" id="jobTitle" placeholder="Job title  e.g. Software Engineer" />
      <input type="text" id="company" placeholder="Company  e.g. Google" />
    </div>

    <div class="section-label">Your Resume</div>
    <textarea id="resumeText" placeholder="Paste your full resume text here...

Include your:
• Work experience
• Education
• Skills
• Projects
• Achievements"></textarea>

    <button class="btn" id="analyzeBtn" onclick="analyzeResume()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Analyze My Resume</span>
      </div>
    </button>

    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="results"></div>

  <footer>
    Built with <span>Gemini API</span> + Firebase &nbsp;·&nbsp; Build With Gemini AI Sprint 2026
  </footer>

</div>

<script>
async function analyzeResume() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const resume = document.getElementById('resumeText').value.trim();
  const jobTitle = document.getElementById('jobTitle').value.trim();
  const company = document.getElementById('company').value.trim();
  const errorBox = document.getElementById('errorBox');

  errorBox.style.display = 'none';

  if (!apiKey) { showError('Please enter your Gemini API key.'); return; }
  if (!resume) { showError('Please paste your resume text.'); return; }

  setLoading(true);

  const jobContext = jobTitle ? `Target role: ${jobTitle}${company ? ' at ' + company : ''}.` : 'No specific job target provided.';

  const prompt = `You are an expert career coach and resume reviewer. Analyze the following resume and provide detailed feedback.

${jobContext}

RESUME:
${resume}

Respond ONLY with a valid JSON object (no markdown, no backticks) in this exact format:
{
  "score": <number 0-100>,
  "verdict": "<one sentence overall verdict>",
  "strengths": ["<strength 1>", "<strength 2>", "<strength 3>"],
  "weaknesses": ["<weakness 1>", "<weakness 2>", "<weakness 3>"],
  "suggestions": ["<suggestion 1>", "<suggestion 2>", "<suggestion 3>"],
  "keywords_missing": ["<keyword 1>", "<keyword 2>", "<keyword 3>"],
  "summary": "<2-3 sentence detailed analysis paragraph>",
  "job_fit": "<if job target given, rate fit as Excellent/Good/Fair/Poor and explain in one sentence, else say Not specified>"
}`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.4 }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API request failed');
    }

    const data = await response.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);
    renderResults(result, jobTitle, company);

  } catch (e) {
    showError('Error: ' + e.message + '. Check your API key and try again.');
  } finally {
    setLoading(false);
  }
}

function renderResults(r, jobTitle, company) {
  const scoreColor = r.score >= 75 ? 'var(--green)' : r.score >= 50 ? 'var(--amber)' : 'var(--red)';
  const jobLine = jobTitle ? `<p style="color:var(--accent);font-size:13px;margin-top:6px;">Job fit for <strong>${jobTitle}${company ? ' @ ' + company : ''}</strong>: ${r.job_fit}</p>` : '';

  document.getElementById('results').innerHTML = `
    <div class="score-banner">
      <div class="score-circle" style="border-color:${scoreColor}; background: ${scoreColor}18;">
        <div class="score-number" style="color:${scoreColor}">${r.score}</div>
        <div class="score-label">/ 100</div>
      </div>
      <div class="score-info">
        <div class="score-title">Resume Score</div>
        <div class="score-desc">${r.verdict}</div>
        ${jobLine}
      </div>
    </div>

    <div class="grid-3">
      <div class="result-card">
        <div class="result-card-title"><div class="dot dot-green"></div>Strengths</div>
        <ul class="result-list">${r.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="result-card">
        <div class="result-card-title"><div class="dot dot-red"></div>Weaknesses</div>
        <ul class="result-list">${r.weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="result-card">
        <div class="result-card-title"><div class="dot dot-amber"></div>Missing Keywords</div>
        <ul class="result-list">${r.keywords_missing.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
    </div>

    <div class="full-card">
      <div class="result-card-title" style="margin-bottom:10px;"><div class="dot dot-accent"></div>Detailed Analysis</div>
      <p>${r.summary}</p>
    </div>

    <div class="full-card">
      <div class="result-card-title" style="margin-bottom:10px;"><div class="dot dot-accent"></div>How to Improve</div>
      <ul class="result-list" style="gap:10px;">${r.suggestions.map(s => `<li style="color:var(--text)">${s}</li>`).join('')}</ul>
    </div>
  `;

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function setLoading(on) {
  document.getElementById('analyzeBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnText').textContent = on ? 'Analyzing...' : 'Analyze My Resume';
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}
</script>
</body>
</html>
